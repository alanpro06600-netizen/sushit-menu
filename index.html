<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sush'IT Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent-red: #ff3e3e;
            --glass-bg: rgba(10, 10, 10, 0.96);
            --text-gold: #f1d279;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-image: url('https://i.imgur.com/xvvP6oB.jpeg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 15px; color: white; display: flex; flex-direction: column; align-items: center;
        }

        /* --- MENU --- */
        #main-menu { width: 100%; max-width: 400px; }
        .header { 
            text-align: center; margin: 10px 0 25px; background: rgba(0,0,0,0.8); 
            padding: 12px; border-radius: 50px; border: 2px solid var(--accent-red);
        }
        .logo { font-size: 1.6rem; font-weight: 900; margin: 0; }
        
        .category-card {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border-radius: 18px; margin-bottom: 10px; padding: 18px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; text-align: center; font-weight: 900; text-transform: uppercase;
        }

        /* --- FICHE PRODUIT --- */
        #details-view { display: none; width: 100%; max-width: 400px; background: var(--glass-bg); border-radius: 25px; padding: 20px; border: 1px solid var(--text-gold); }
        
        .media-box { 
            width: 160px; height: 160px; /* Taille carrée réduite */
            margin: 0 auto 15px auto; 
            border-radius: 15px; overflow: hidden; 
            background: #000; border: 1px solid var(--text-gold);
        }
        .media-box img, .media-box video { width: 100%; height: 100%; object-fit: cover; }

        .price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .price-item { 
            background: rgba(255,62,62,0.1); padding: 10px 5px; border-radius: 12px; 
            text-align: center; border: 1px solid rgba(255,62,62,0.3);
        }
        .p-gram { font-size: 0.75rem; color: var(--text-gold); font-weight: bold; display: block; }
        .p-value { font-size: 1.1rem; font-weight: 900; }

        /* --- AVIS --- */
        .review-box { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; margin-top: 15px; }
        .stars { display: flex; gap: 5px; margin-bottom: 10px; justify-content: center; }
        .star { font-size: 20px; color: #333; cursor: pointer; }
        .star.active { color: var(--text-gold); }
        textarea { width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 8px; color: white; padding: 8px; font-size: 0.8rem; }
        .btn-post { background: var(--accent-red); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 5px; }

        .btn-back { background: transparent; color: white; border: 1px solid white; padding: 10px; width: 100%; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="header" id="admin-trigger"><h1 class="logo">SUSH'IT</h1></div>
        
        <div class="category-card" onclick="openProduct('FROZEN', 'https://i.imgur.com/xvvP6oB.jpeg', 'Qualité supérieure, effet givré.', [['2g','20€'],['6g','50€'],['10g','70€']])">❄️ FROZEN</div>
        <div class="category-card" onclick="openProduct('FILTRÉ', 'https://i.imgur.com/xvvP6oB.jpeg', 'Filtrage traditionnel 90u.', [['2g','20€'],['6g','50€'],['10g','70€']])">💥 FILTRÉ</div>
        <div class="category-card" onclick="openProduct('STATIC', 'https://i.imgur.com/xvvP6oB.jpeg', 'Extraction à froid, pureté max.', [['2g','20€'],['6g','50€'],['10g','70€']])">⚡️ STATIC</div>
        <div class="category-card" onclick="openProduct('MOUSSEUX', 'https://i.imgur.com/xvvP6oB.jpeg', 'Texture mousseuse et légère.', [['2g','10€'],['4.5g','20€'],['12g','50€']], 'https://www.dropbox.com/scl/fi/5wt41hiv7g8kr48eytecb/EE29B192-97E3-4D85-B637-EA1BA814D3F3.mp4?rlkey=t84b4b5t4u6jbet3yodx6zd16&st=x8bqu2m6&raw=1')">☁️ MOUSSEUX</div>
    </div>

    <div id="details-view">
        <div id="media-content" class="media-box"></div>
        <h2 id="prod-title" style="color:var(--text-gold); margin: 0; text-transform: uppercase; text-align: center; font-size: 1.4rem;"></h2>
        <p id="prod-desc" style="opacity: 0.7; font-size: 0.8rem; margin: 5px 0; text-align: center;"></p>
        
        <div id="prod-prices" class="price-grid"></div>

        <div class="review-box">
            <div class="stars" id="star-rating">
                <span class="star" onclick="setStar(1)">★</span><span class="star" onclick="setStar(2)">★</span><span class="star" onclick="setStar(3)">★</span><span class="star" onclick="setStar(4)">★</span><span class="star" onclick="setStar(5)">★</span>
            </div>
            <textarea id="review-text" rows="1" placeholder="Ton avis..."></textarea>
            <button class="btn-post" onclick="postReview()">POSTER</button>
            <div id="comments-list" style="max-height: 100px; overflow-y: auto; margin-top: 10px;"></div>
        </div>
        <button class="btn-back" onclick="goBack()">← RETOUR</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let currentRating = 0, currentProduct = "", adminMode = false;

        function openProduct(title, media, desc, prices, videoUrl = null) {
            currentProduct = title;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';
            document.getElementById('prod-title').innerText = title;
            document.getElementById('prod-desc').innerText = desc;
            
            let mediaHtml = videoUrl ? 
                `<video id="vp" controls playsinline webkit-playsinline muted autoplay loop><source src="${videoUrl}" type="video/mp4"></video>` : 
                `<img src="${media}">`;
            
            document.getElementById('media-content').innerHTML = mediaHtml;
            
            let priceHtml = "";
            prices.forEach(p => {
                priceHtml += `<div class="price-item"><span class="p-gram">${p[0]}</span><span class="p-value">${p[1]}</span></div>`;
            });
            document.getElementById('prod-prices').innerHTML = priceHtml;
            loadComments();
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('details-view').style.display = 'none';
            const v = document.getElementById('vp'); if(v) v.pause();
        }

        // --- Fonctions Avis Simplifiées ---
        function setStar(n) { currentRating = n; document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < n)); }
        function postReview() {
            const text = document.getElementById('review-text').value;
            if(!currentRating || !text.trim()) return;
            const review = { id: Date.now(), prod: currentProduct, rating: currentRating, text: text };
            let reviews = JSON.parse(localStorage.getItem('s_rev') || "[]");
            reviews.unshift(review);
            localStorage.setItem('s_rev', JSON.stringify(reviews));
            document.getElementById('review-text').value = ''; setStar(0); loadComments();
        }
        function loadComments() {
            let reviews = JSON.parse(localStorage.getItem('s_rev') || "[]");
            let html = "";
            reviews.filter(r => r.prod === currentProduct).forEach(r => {
                html += `<div style="font-size:0.7rem; margin-bottom:5px; padding:5px; background:rgba(255,255,255,0.05); border-radius:5px;">
                    <span style="color:var(--text-gold)">${"★".repeat(r.rating)}</span> ${r.text}
                </div>`;
            });
            document.getElementById('comments-list').innerHTML = html || "<div style='opacity:0.3; font-size:0.7rem; text-align:center;'>Aucun avis.</div>";
        }
    </script>
</body>
</html>
