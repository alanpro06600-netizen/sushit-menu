<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sush'IT Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent-red: #ff3e3e;
            --glass-bg: rgba(15, 15, 15, 0.85);
            --text-gold: #f1d279;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-image: url(https://i.imgur.com/xvvP6oB.jpeg); /* Remplace par le lien de l'image générée */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid var(--accent-red);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 2px;
            color: white;
            text-shadow: 2px 2px 10px rgba(255, 62, 62, 0.8);
        }

        .category-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .category-title {
            display: flex;
            align-items: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--text-gold);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(241, 210, 121, 0.3);
            padding-bottom: 10px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .price-row:last-child { border-bottom: none; }

        .weight { 
            font-size: 1.1rem; 
            font-weight: 500;
        }

        .price { 
            background: linear-gradient(135deg, #ff3e3e 0%, #a80000 100%);
            color: white; 
            padding: 6px 15px; 
            border-radius: 12px; 
            font-weight: bold;
            min-width: 50px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(255, 62, 62, 0.3);
        }

        /* Effets de brillance sur les catégories spéciales */
        .frozen-style { border-top: 3px solid #00f2ff; }
        .static-style { border-top: 3px solid #ffcc00; }

        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            background: rgba(0,0,0,0.4);
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">SUSH'IT</h1>
    </div>

    <div class="category-card frozen-style">
        <div class="category-title">❄️ FROZEN</div>
        <div class="price-row"><span class="weight">2g</span> <span class="price">20€</span></div>
        <div class="price-row"><span class="weight">6g</span> <span class="price">50€</span></div>
        <div class="price-row"><span class="weight">10g</span> <span class="price">70€</span></div>
    </div>

    <div class="category-card">
        <div class="category-title">💥 FILTRÉ</div>
        <div class="price-row"><span class="weight">2g</span> <span class="price">20€</span></div>
        <div class="price-row"><span class="weight">6g</span> <span class="price">50€</span></div>
        <div class="price-row"><span class="weight">10g</span> <span class="price">70€</span></div>
    </div>

    <div class="category-card static-style">
        <div class="category-title">⚡️ STATIC</div>
        <div class="price-row"><span class="weight">2g</span> <span class="price">20€</span></div>
        <div class="price-row"><span class="weight">6g</span> <span class="price">50€</span></div>
        <div class="price-row"><span class="weight">10g</span> <span class="price">70€</span></div>
    </div>

    <div class="footer">
        ⛩️ Sush'IT Premium Quality ⛩️
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand(); // Pour que l'app prenne tout l'écran
        
        // Configuration de la couleur de la barre de statut Telegram
        tele.setHeaderColor('#000000');
        tele.setBackgroundColor('#000000');
    </script>
</body>
</html>
