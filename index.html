<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sush'IT Premium Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent-red: #ff3e3e;
            --glass-bg: rgba(15, 15, 15, 0.98);
            --text-gold: #f1d279;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: -apple-system, sans-serif;
            background-image: url('https://i.imgur.com/xvvP6oB.jpeg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 0; color: white;
        }

        /* --- MENU PRINCIPAL --- */
        #main-menu { padding: 20px; width: 100%; max-width: 450px; margin: 0 auto; }
        
        .header { 
            text-align: center; margin: 20px 0 30px; background: rgba(0,0,0,0.8); 
            padding: 15px; border-radius: 50px; border: 2px solid var(--accent-red); 
            cursor: pointer; user-select: none; -webkit-user-select: none;
        }
        .logo { font-size: 1.8rem; font-weight: 900; margin: 0; pointer-events: none; }

        .category-item {
            background: var(--glass-bg); border-radius: 15px; margin-bottom: 10px; padding: 18px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
        }
        .cat-left { display: flex; align-items: center; gap: 15px; font-size: 1.1rem; font-weight: 600; }
        
        /* Miniatures avec Drapeaux */
        .cat-img-wrapper { position: relative; width: 45px; height: 45px; }
        .cat-img { width: 100%; height: 100%; border-radius: 10px; object-fit: cover; border: 1px solid var(--text-gold); }
        .flag-badge {
            position: absolute; bottom: -5px; right: -5px; font-size: 14px;
            background: rgba(0,0,0,0.7); border-radius: 50%; width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- PANELS (DETAILS & ADMIN) --- */
        .panel { 
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95); z-index: 999; overflow-y: auto;
        }

        .modal-content {
            width: 100%; max-width: 450px; margin: 50px auto 0;
            background: var(--glass-bg); border-radius: 30px 30px 0 0;
            padding: 20px; min-height: 100vh; border: 1px solid var(--text-gold);
        }
        
        .main-media-box { 
            width: 100%; aspect-ratio: 1 / 1; 
            margin-bottom: 15px; border-radius: 20px; 
            overflow: hidden; background: #000; border: 1px solid #333; position: relative;
        }
        .main-media-box img, .main-media-box video { width: 100%; height: 100%; object-fit: cover; }
        .big-flag { position: absolute; top: 15px; right: 15px; font-size: 24px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 8px; }

        .thumb-container { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .thumb { 
            width: 65px; height: 65px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1); 
            overflow: hidden; cursor: pointer; background: #000;
        }
        .thumb.active { border-color: var(--text-gold); }
        .thumb img, .thumb video { width: 100%; height: 100%; object-fit: cover; }

        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .price-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,62,62,0.3); }

        /* --- AVIS --- */
        .review-box { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stars { display: flex; gap: 8px; margin-bottom: 10px; justify-content: center; }
        .star { font-size: 24px; color: #333; cursor: pointer; }
        .star.active { color: var(--text-gold); }
        textarea { width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 10px; color: white; padding: 12px; font-family: inherit; margin-bottom: 10px; }

        /* --- BOUTONS --- */
        .btn-action { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-add { background: var(--text-gold); color: #000; }
        .btn-save { background: #2ecc71; color: white; }
        .btn-red { background: var(--accent-red); color: white; }
        .btn-outline { background: transparent; border: 1px solid white; color: white; }

        /* --- ADMIN INPUTS --- */
        .admin-input { width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 8px; color: white; padding: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="header" id="admin-trigger"><h1 class="logo">SUSH'IT</h1></div>
        
        <div id="admin-controls" style="display:none; margin-bottom:20px;">
            <button class="btn-action btn-add" onclick="showPanel('admin-panel')">➕ CRÉER UNE FICHE PRODUIT</button>
        </div>

        <div id="product-list"></div>
    </div>

    <div id="details-view" class="panel">
        <div class="modal-content">
            <div id="main-display" class="main-media-box"></div>
            <div id="thumbs" class="thumb-container"></div>
            <h2 id="prod-title" style="color:var(--text-gold); text-align:center; text-transform:uppercase; margin:0;"></h2>
            <p id="prod-desc" style="opacity:0.7; text-align:center; margin:10px 0;"></p>
            <div id="prod-prices" class="price-grid"></div>

            <div class="review-box">
                <div class="stars" id="star-rating">
                    <span class="star" onclick="setStar(1)">★</span><span class="star" onclick="setStar(2)">★</span><span class="star" onclick="setStar(3)">★</span><span class="star" onclick="setStar(4)">★</span><span class="star" onclick="setStar(5)">★</span>
                </div>
                <textarea id="review-text" rows="2" placeholder="Laisse un avis sur ce produit..."></textarea>
                <button class="btn-action btn-red" onclick="postReview()">POSTER L'AVIS</button>
                <div id="comments-list" style="margin-top:15px;"></div>
            </div>

            <button class="btn-action btn-outline" style="margin-top:20px;" onclick="closeView('details-view')">RETOUR AU CATALOGUE</button>
        </div>
    </div>

    <div id="admin-panel" class="panel">
        <div class="modal-content">
            <h2 style="text-align:center; color:var(--text-gold);">NOUVELLE FICHE</h2>
            <input type="text" id="new-name" class="admin-input" placeholder="Nom du produit">
            <input type="text" id="new-flag" class="admin-input" placeholder="Drapeau Emoji (ex: 🇲🇦)">
            <input type="text" id="new-thumb" class="admin-input" placeholder="URL Image Miniature">
            <input type="text" id="new-img" class="admin-input" placeholder="URL Photo Principale">
            <input type="text" id="new-vid" class="admin-input" placeholder="URL Vidéo (Optionnel)">
            <textarea id="new-desc" class="admin-input" placeholder="Description..."></textarea>
            
            <div id="price-inputs">
                <div style="display:flex; gap:5px; margin-bottom:5px;">
                    <input type="text" placeholder="Grammes" class="admin-input g-in">
                    <input type="text" placeholder="Prix" class="admin-input p-in">
                </div>
            </div>
            <button onclick="addPriceLine()" style="background:none; color:white; border:1px dashed #666; width:100%; padding:10px; margin-bottom:20px; border-radius:10px;">+ Ajouter une ligne de prix</button>
            
            <button class="btn-action btn-save" onclick="saveProduct()">ENREGISTRER LA FICHE</button>
            <button class="btn-action btn-red" onclick="showPanel('main-menu')">ANNULER</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // DONNÉES PAR DÉFAUT
        let defaultProducts = [
            { name: 'FROZEN', flag: '🇲🇦', thumb: 'https://i.imgur.com/xvvP6oB.jpeg', img: 'https://i.imgur.com/xvvP6oB.jpeg', vid: '', desc: 'Texture givrée premium.', prices: [['2g','20€'],['6g','50€'],['10g','70€'],['25g','150€']] },
            { name: 'FILTRÉ', flag: '🇲🇦', thumb: 'https://i.imgur.com/xvvP6oB.jpeg', img: 'https://i.imgur.com/xvvP6oB.jpeg', vid: '', desc: 'Filtrage traditionnel.', prices: [['2g','20€'],['6g','50€'],['10g','70€'],['25g','150€']] },
            { name: 'STATIC', flag: '🇲🇦', thumb: 'https://i.imgur.com/xvvP6oB.jpeg', img: 'https://i.imgur.com/xvvP6oB.jpeg', vid: '', desc: 'Puissance et pureté.', prices: [['2g','20€'],['6g','50€'],['10g','70€'],['25g','160€']] },
            { name: 'MOUSSEUX', flag: '🇲🇦', thumb: 'https://i.imgur.com/LitPBka.png', img: 'https://i.imgur.com/LitPBka.png', vid: 'https://dl.dropboxusercontent.com/scl/fi/5wt41hiv7g8kr48eytecb/EE29B192-97E3-4D85-B637-EA1BA814D3F3.mp4?rlkey=t84b4b5t4u6jbet3yodx6zd16', desc: 'Douceur et légèreté.', prices: [['2g','10€'],['4.5g','20€'],['12g','50€'],['25g','80€']] }
        ];

        let products = JSON.parse(localStorage.getItem('s_prods')) || defaultProducts;
        let adminMode = false;
        let pressTimer;
        let activeIdx = null;
        let currentRating = 0;

        // ACTIVATION ADMIN (3s)
        document.getElementById('admin-trigger').addEventListener('touchstart', () => {
            pressTimer = setTimeout(() => {
                adminMode = !adminMode;
                document.getElementById('admin-controls').style.display = adminMode ? 'block' : 'none';
                renderProducts();
                alert(adminMode ? "ACCÈS ADMIN DÉVERROUILLÉ 🔓" : "MODE ADMIN FERMÉ 🔒");
            }, 3000);
        });
        document.getElementById('admin-trigger').addEventListener('touchend', () => clearTimeout(pressTimer));

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            products.forEach((p, i) => {
                list.innerHTML += `
                    <div class="category-item" onclick="openProduct(${i})">
                        <div class="cat-left">
                            <div class="cat-img-wrapper">
                                <img src="${p.thumb}" class="cat-img">
                                <div class="flag-badge">${p.flag || '📍'}</div>
                            </div>
                            <span>${p.name}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            ${adminMode ? `<span style="color:red; font-weight:bold; padding:10px;" onclick="event.stopPropagation(); deleteProduct(${i})">🗑️</span>` : ''}
                            <span>❯</span>
                        </div>
                    </div>`;
            });
        }

        function openProduct(i) {
            activeIdx = i;
            const p = products[i];
            document.getElementById('details-view').style.display = 'block';
            document.getElementById('prod-title').innerText = p.name;
            document.getElementById('prod-desc').innerText = p.desc;
            setMedia('img', p.img);
            
            const thumbs = document.getElementById('thumbs');
            thumbs.innerHTML = '';
            if(p.vid) {
                thumbs.innerHTML = `
                    <div class="thumb active" onclick="setMedia('img', '${p.img}', this)"><img src="${p.img}"></div>
                    <div class="thumb" onclick="setMedia('vid', '${p.vid}', this)"><video src="${p.vid}" muted></video></div>`;
            }

            let priceHtml = '';
            p.prices.forEach(pr => {
                priceHtml += `<div class="price-item"><div style="color:var(--text-gold);font-weight:bold;">${pr[0]}</div><div style="font-size:1.2rem;font-weight:900;">${pr[1]}</div></div>`;
            });
            document.getElementById('prod-prices').innerHTML = priceHtml;
            loadReviews();
        }

        function setMedia(type, url, el) {
            const display = document.getElementById('main-display');
            const flag = products[activeIdx].flag || '📍';
            display.innerHTML = (type === 'vid' ? `<video autoplay loop muted playsinline controls src="${url}"></video>` : `<img src="${url}">`) + `<div class="big-flag">${flag}</div>`;
            if(el) { document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active')); el.classList.add('active'); }
        }

        // --- GESTION AVIS ---
        function setStar(n) { currentRating = n; document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < n)); }
        
        function postReview() {
            const text = document.getElementById('review-text').value;
            if(!currentRating || !text.trim()) return;
            let reviews = JSON.parse(localStorage.getItem('s_reviews') || "[]");
            reviews.unshift({ id: Date.now(), prod: products[activeIdx].name, rating: currentRating, text: text });
            localStorage.setItem('s_reviews', JSON.stringify(reviews));
            document.getElementById('review-text').value = ''; setStar(0); loadReviews();
        }

        function loadReviews() {
            let reviews = JSON.parse(localStorage.getItem('s_reviews') || "[]");
            let html = "";
            reviews.filter(r => r.prod === products[activeIdx].name).forEach(r => {
                html += `<div style="background:rgba(255,255,255,0.05);padding:10px;border-radius:8px;margin-bottom:8px;position:relative;font-size:13px;">
                    ${adminMode ? `<span style="position:absolute;right:10px;color:red;font-weight:bold;" onclick="deleteReview(${r.id})">✕</span>` : ''}
                    <div style="color:var(--text-gold);">${"★".repeat(r.rating)}</div>
                    <div>${r.text}</div>
                </div>`;
            });
            document.getElementById('comments-list').innerHTML = html || "<div style='opacity:0.3;text-align:center;'>Aucun avis pour le moment.</div>";
        }

        function deleteReview(id) {
            let reviews = JSON.parse(localStorage.getItem('s_reviews') || "[]");
            localStorage.setItem('s_reviews', JSON.stringify(reviews.filter(r => r.id !== id)));
            loadReviews();
        }

        // --- ADMIN FONCTIONS ---
        function addPriceLine() {
            const div = document.createElement('div');
            div.style.display = 'flex'; div.style.gap = '5px'; div.style.marginBottom = '5px';
            div.innerHTML = `<input type="text" placeholder="10g" class="admin-input g-in"><input type="text" placeholder="70€" class="admin-input p-in">`;
            document.getElementById('price-inputs').appendChild(div);
        }

        function saveProduct() {
            const name = document.getElementById('new-name').value;
            const flag = document.getElementById('new-flag').value;
            const thumb = document.getElementById('new-thumb').value;
            const img = document.getElementById('new-img').value;
            const vid = document.getElementById('new-vid').value;
            const desc = document.getElementById('new-desc').value;
            
            const gIn = document.querySelectorAll('.g-in'), pIn = document.querySelectorAll('.p-in');
            let priceList = [];
            gIn.forEach((g, i) => { if(g.value) priceList.push([g.value, pIn[i].value]); });

            if(!name || !thumb || !img) return alert("Nom et photos requis !");

            products.push({ name, flag, thumb, img, vid, desc, prices: priceList });
            localStorage.setItem('s_prods', JSON.stringify(products));
            location.reload();
        }

        function deleteProduct(i) {
            if(confirm("Supprimer définitivement ce produit ?")) {
                products.splice(i, 1);
                localStorage.setItem('s_prods', JSON.stringify(products));
                renderProducts();
            }
        }

        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
            if(id !== 'main-menu') document.getElementById(id).style.display = 'block';
        }

        function closeView(id) { document.getElementById(id).style.display = 'none'; }

        renderProducts();
    </script>
</body>
</html>
