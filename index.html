<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sush'IT Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent-red: #ff3e3e;
            --glass-bg: rgba(10, 10, 10, 0.98);
            --text-gold: #f1d279;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-image: url('https://i.imgur.com/xvvP6oB.jpeg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 0; color: white;
            overflow-y: auto;
        }

        /* --- MENU PRINCIPAL --- */
        #main-menu { padding: 20px; width: 100%; max-width: 400px; margin: 0 auto; }
        .header { text-align: center; margin: 20px 0 30px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 50px; border: 2px solid var(--accent-red); }
        .logo { font-size: 1.8rem; font-weight: 900; margin: 0; }
        .category-card { background: var(--glass-bg); border-radius: 20px; margin-bottom: 12px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; text-align: center; font-weight: 900; }

        /* --- FICHE PRODUIT STYLE "PANNEAU" --- */
        #details-view { 
            display: none; 
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); /* Fond assombri derrière */
            z-index: 999;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .modal-content {
            width: 100%;
            max-width: 450px;
            margin: 80px auto 0 auto; /* DISTANCE IMPORTANTE AVEC LE HAUT */
            background: var(--glass-bg);
            border-radius: 30px 30px 0 0;
            padding: 25px;
            min-height: 100%;
            border: 1px solid var(--text-gold);
            border-bottom: none;
        }
        
        /* GRAND CARRÉ COMME DANS TON EXEMPLE */
        .media-box { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            margin-bottom: 20px; 
            border-radius: 20px; 
            overflow: hidden; 
            background: #000; 
            border: 1px solid #333;
        }
        .media-box video, .media-box img { width: 100%; height: 100%; object-fit: cover; }

        /* GRILLE DE PRIX */
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .price-item { background: rgba(255,255,255,0.05); padding: 18px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,62,62,0.3); }
        .p-gram { font-weight: bold; color: var(--text-gold); font-size: 1rem; }
        .p-value { display: block; font-size: 1.3rem; font-weight: 900; }

        .btn-back { background: transparent; color: white; border: 1px solid white; padding: 15px; width: 100%; border-radius: 15px; margin: 20px 0 100px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="header"><h1 class="logo">SUSH'IT</h1></div>
        <div class="category-card" onclick="openProduct('FROZEN', 'https://i.imgur.com/xvvP6oB.jpeg', 'Texture givrée premium.', [['2g','20€'],['6g','50€'],['10g','70€'],['25g','150€']])">❄️ FROZEN</div>
        <div class="category-card" onclick="openProduct('FILTRÉ', 'https://i.imgur.com/xvvP6oB.jpeg', 'Filtrage traditionnel.', [['2g','20€'],['6g','50€'],['10g','70€'],['25g','150€']])">💥 FILTRÉ</div>
        <div class="category-card" onclick="openProduct('STATIC', 'https://i.imgur.com/xvvP6oB.jpeg', 'Puissance et pureté.', [['2g','20€'],['6g','50€'],['10g','70€'],['25g','160€']])">⚡️ STATIC</div>
        <div class="category-card" onclick="openProduct('MOUSSEUX', 'https://i.imgur.com/xvvP6oB.jpeg', 'Douceur et légèreté.', [['2g','10€'],['4.5g','20€'],['12g','50€'],['25g','100€']], 'https://www.dropbox.com/scl/fi/5wt41hiv7g8kr48eytecb/EE29B192-97E3-4D85-B637-EA1BA814D3F3.mp4?rlkey=t84b4b5t4u6jbet3yodx6zd16&st=x8bqu2m6&raw=1')">🧽 MOUSSEUX</div>
    </div>

    <div id="details-view">
        <div class="modal-content">
            <div id="media-content" class="media-box"></div>
            <h2 id="prod-title" style="color:var(--text-gold); margin: 0; text-transform: uppercase; text-align: center; font-size: 1.8rem;"></h2>
            <p id="prod-desc" style="opacity: 0.7; text-align: center; margin: 10px 0;"></p>
            
            <div id="prod-prices" class="price-grid"></div>
            
            <button class="btn-back" onclick="goBack()">RETOUR AU CATALOGUE</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openProduct(title, media, desc, prices, videoUrl = null) {
            document.getElementById('details-view').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Bloque le menu derrière
            document.getElementById('prod-title').innerText = title;
            document.getElementById('prod-desc').innerText = desc;
            
            let mediaHtml = videoUrl ? 
                `<video id="vp" controls playsinline webkit-playsinline muted autoplay loop><source src="${videoUrl}" type="video/mp4"></video>` : 
                `<img src="${media}">`;
            
            document.getElementById('media-content').innerHTML = mediaHtml;
            
            let priceHtml = "";
            prices.forEach(p => {
                priceHtml += `<div class="price-item"><span class="p-gram">${p[0]}</span><span class="p-value">${p[1]}</span></div>`;
            });
            document.getElementById('prod-prices').innerHTML = priceHtml;
            document.getElementById('details-view').scrollTo(0,0);
        }

        function goBack() {
            document.getElementById('details-view').style.display = 'none';
            document.body.style.overflow = 'auto';
            const v = document.getElementById('vp'); if(v) v.pause();
        }
    </script>
</body>
</html>
