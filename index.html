<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sush'IT Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent-red: #ff3e3e;
            --glass-bg: rgba(10, 10, 10, 0.96);
            --text-gold: #f1d279;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-image: url('https://i.imgur.com/xvvP6oB.jpeg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 0; color: white;
            overflow-y: auto;
            height: 100vh;
        }

        #main-menu { padding: 20px; width: 100%; max-width: 400px; margin: 0 auto; }
        
        .header { 
            text-align: center; margin: 20px 0 30px; background: rgba(0,0,0,0.8); 
            padding: 15px; border-radius: 50px; border: 2px solid var(--accent-red);
        }
        .logo { font-size: 1.8rem; font-weight: 900; margin: 0; }
        
        .category-card {
            background: var(--glass-bg); backdrop-filter: blur(10px);
            border-radius: 20px; margin-bottom: 12px; padding: 25px; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; text-align: center; font-weight: 900;
        }

        /* --- FICHE PRODUIT --- */
        #details-view { 
            display: none; 
            width: 100%; 
            max-width: 400px; 
            margin: 0 auto;
            background: var(--glass-bg); 
            min-height: 100vh;
            /* MARGE DE SÉCURITÉ HAUT POUR TELEGRAM */
            padding: 60px 20px 40px 20px; 
            border-left: 1px solid var(--text-gold);
            border-right: 1px solid var(--text-gold);
            overflow-y: auto;
        }
        
        .media-box { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            margin-bottom: 20px; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000; 
            border: 1px solid #333;
        }
        
        .media-box img, .media-box video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }

        /* Grille adaptée pour 4 prix (2x2) */
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .price-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,62,62,0.3); }
        .p-gram { font-weight: bold; color: var(--text-gold); }
        .p-value { display: block; font-size: 1.2rem; font-weight: 900; }

        .review-box { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; margin-top: 20px; }
        .stars { display: flex; gap: 8px; margin-bottom: 10px; justify-content: center; }
        .star { font-size: 24px; color: #333; cursor: pointer; }
        .star.active { color: var(--text-gold); }
        textarea { width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 10px; color: white; padding: 12px; }
        .btn-post { background: var(--accent-red); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        .btn-back { background: transparent; color: white; border: 1px solid white; padding: 12px; width: 100%; border-radius: 10px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="header"><h1 class="logo">SUSH'IT</h1></div>
        
        <div class="category-card" onclick="openProduct('FROZEN', 'https://i.imgur.com/xvvP6oB.jpeg', 'Texture givrée premium.', [['2g','20€'],['6g','50€'],['10g','70€'],['25g','150€']])">❄️ FROZEN</div>
        
        <div class="category-card" onclick="openProduct('FILTRÉ', 'https://i.imgur.com/xvvP6oB.jpeg', 'Filtrage traditionnel.', [['2g','20€'],['6g','50€'],['10g','70€'],['25g','150€']])">💥 FILTRÉ</div>
        
        <div class="category-card" onclick="openProduct('STATIC', 'https://i.imgur.com/xvvP6oB.jpeg', 'Puissance et pureté.', [['2g','20€'],['6g','50€'],['10g','70€'],['25g','150€']])">⚡️ STATIC</div>
        
        <div class="category-card" onclick="openProduct('MOUSSEUX', 'https://i.imgur.com/xvvP6oB.jpeg', 'Douceur et légèreté.', [['2g','10€'],['4.5g','20€'],['12g','50€'],['25g','80€']], 'https://www.dropbox.com/scl/fi/5wt41hiv7g8kr48eytecb/EE29B192-97E3-4D85-B637-EA1BA814D3F3.mp4?rlkey=t84b4b5t4u6jbet3yodx6zd16&st=x8bqu2m6&raw=1')">🧽 MOUSSEUX</div>
    </div>

    <div id="details-view">
        <div id="media-content" class="media-box"></div>
        <h2 id="prod-title" style="color:var(--text-gold); margin: 0; text-transform: uppercase; text-align: center;"></h2>
        <p id="prod-desc" style="opacity: 0.7; text-align: center; margin-top: 5px;"></p>
        <div id="prod-prices" class="price-grid"></div>
        <div class="review-box">
            <div class="stars" id="star-rating">
                <span class="star" onclick="setStar(1)">★</span><span class="star" onclick="setStar(2)">★</span><span class="star" onclick="setStar(3)">★</span><span class="star" onclick="setStar(4)">★</span><span class="star" onclick="setStar(5)">★</span>
            </div>
            <textarea id="review-text" rows="2" placeholder="Laisse un avis..."></textarea>
            <button class="btn-post" onclick="postReview()">POSTER</button>
            <div id="comments-list" style="margin-top: 15px;"></div>
        </div>
        <button class="btn-back" onclick="goBack()">← RETOUR</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openProduct(title, media, desc, prices, videoUrl = null) {
            currentProduct = title;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';
            document.getElementById('prod-title').innerText = title;
            document.getElementById('prod-desc').innerText = desc;
            
            let mediaHtml = videoUrl ? 
                `<video id="vp" controls playsinline webkit-playsinline muted autoplay loop style="width:100%; height:100%; object-fit:cover;"><source src="${videoUrl}" type="video/mp4"></video>` : 
                `<img src="${media}" style="width:100%; height:100%; object-fit:cover;">`;
            
            document.getElementById('media-content').innerHTML = mediaHtml;
            
            let priceHtml = "";
            prices.forEach(p => {
                priceHtml += `<div class="price-item"><span class="p-gram">${p[0]}</span><span class="p-value">${p[1]}</span></div>`;
            });
            document.getElementById('prod-prices').innerHTML = priceHtml;
            loadComments();
            window.scrollTo(0,0);
        }

        function goBack() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('details-view').style.display = 'none';
            const v = document.getElementById('vp'); if(v) v.pause();
        }

        let currentRating = 0, currentProduct = "";
        function setStar(n) { currentRating = n; document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < n)); }

        function postReview() {
            const text = document.getElementById('review-text').value;
            if(!currentRating || !text.trim()) return;
            const review = { id: Date.now(), prod: currentProduct, rating: currentRating, text: text };
            let reviews = JSON.parse(localStorage.getItem('s_rev') || "[]");
            reviews.unshift(review);
            localStorage.setItem('s_rev', JSON.stringify(reviews));
            document.getElementById('review-text').value = ''; setStar(0); loadComments();
        }

        function loadComments() {
            let reviews = JSON.parse(localStorage.getItem('s_rev') || "[]");
            let html = "";
            reviews.filter(r => r.prod === currentProduct).forEach(r => {
                html += `<div style="font-size:0.85rem; margin-bottom:10px; padding:10px; background:rgba(255,255,255,0.05); border-radius:10px;">
                    <span style="color:var(--text-gold)">${"★".repeat(r.rating)}</span><br>${r.text}
                </div>`;
            });
            document.getElementById('comments-list').innerHTML = html || "<div style='opacity:0.3; text-align:center;'>Aucun avis.</div>";
        }
    </script>
</body>
</html>
