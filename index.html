<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sush'IT Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent-red: #ff3e3e;
            --glass-bg: rgba(15, 15, 15, 0.98);
            --text-gold: #f1d279;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://i.imgur.com/xvvP6oB.jpeg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 0; color: white; overflow-x: hidden;
        }

        /* --- MENU --- */
        #main-menu { padding: 20px; width: 100%; max-width: 450px; margin: 0 auto; }
        .header { text-align: center; margin: 20px 0 30px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 50px; border: 2px solid var(--accent-red); cursor: pointer; }
        .logo { font-size: 1.8rem; font-weight: 900; margin: 0; }

        .category-item {
            background: var(--glass-bg); border-radius: 15px; margin-bottom: 10px; padding: 18px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
        }
        .cat-left { display: flex; align-items: center; gap: 15px; font-size: 1.1rem; font-weight: 600; }
        .cat-icon { font-size: 1.4rem; width: 30px; text-align: center; }
        .arrow-right { opacity: 0.4; font-size: 1.2rem; }

        /* --- FICHE PRODUIT --- */
        #details-view { 
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 999;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        .modal-content {
            width: 100%; max-width: 450px; margin: 80px auto 0 auto;
            background: var(--glass-bg); border-radius: 30px 30px 0 0;
            padding: 25px; min-height: 100vh; border: 1px solid var(--text-gold); border-bottom: none;
        }
        
        .slider-container {
            width: 100%; aspect-ratio: 1 / 1; margin-bottom: 20px;
            border-radius: 20px; overflow: hidden; background: #000; border: 1px solid #333;
            position: relative;
        }

        .slider-wrapper {
            display: flex; height: 100%;
            overflow-x: auto; scroll-snap-type: x mandatory;
            scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .slider-wrapper::-webkit-scrollbar { display: none; }

        .slide {
            width: 100%; height: 100%; flex-shrink: 0;
            scroll-snap-align: start; display: flex; align-items: center; justify-content: center;
        }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide video { width: 100%; height: 100%; object-fit: cover; background: #000; position: relative; z-index: 10; }

        .slider-dots {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: none; gap: 8px; pointer-events: none; z-index: 20;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.4); }
        .dot.active { background: var(--text-gold); width: 20px; border-radius: 10px; }

        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .price-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,62,62,0.3); }
        .p-gram { font-weight: bold; color: var(--text-gold); }
        .p-value { display: block; font-size: 1.2rem; font-weight: 900; }

        .btn-back { background: transparent; color: white; border: 1px solid white; padding: 15px; width: 100%; border-radius: 15px; margin: 20px 0 120px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="header"><h1 class="logo">SUSH'IT</h1></div>
        
        <div class="category-item" onclick="openProduct('FROZEN', 'https://i.imgur.com/xvvP6oB.jpeg', 'Texture givrÃĐe premium.', [['2g','20âŽ'],['6g','50âŽ'],['10g','70âŽ'],['25g','150âŽ']])">
            <div class="cat-left"><span class="cat-icon">âïļ</span><span>FROZEN</span></div><div class="arrow-right">âŊ</div>
        </div>

        <div class="category-item" onclick="openProduct('FILTRÃ', 'https://i.imgur.com/xvvP6oB.jpeg', 'Filtrage traditionnel.', [['2g','20âŽ'],['6g','50âŽ'],['10g','70âŽ'],['25g','150âŽ']])">
            <div class="cat-left"><span class="cat-icon">ðĨ</span><span>FILTRÃ</span></div><div class="arrow-right">âŊ</div>
        </div>

        <div class="category-item" onclick="openProduct('STATIC', 'https://i.imgur.com/xvvP6oB.jpeg', 'Puissance et puretÃĐ.', [['2g','20âŽ'],['6g','50âŽ'],['10g','70âŽ'],['25g','160âŽ']])">
            <div class="cat-left"><span class="cat-icon">âĄïļ</span><span>STATIC</span></div><div class="arrow-right">âŊ</div>
        </div>

        <div class="category-item" onclick="openProduct('MOUSSEUX', 'https://i.imgur.com/xvvP6oB.jpeg', 'Douceur et lÃĐgÃĻretÃĐ.', [['2g','10âŽ'],['4.5g','20âŽ'],['12g','50âŽ'],['25g','100âŽ']], 'https://www.dropbox.com/scl/fi/5wt41hiv7g8kr48eytecb/EE29B192-97E3-4D85-B637-EA1BA814D3F3.mp4?rlkey=t84b4b5t4u6jbet3yodx6zd16&st=x8bqu2m6&raw=1')">
            <div class="cat-left"><span class="cat-icon">ð§―</span><span>MOUSSEUX</span></div><div class="arrow-right">âŊ</div>
        </div>
    </div>

    <div id="details-view">
        <div class="modal-content">
            <div class="slider-container">
                <div class="slider-wrapper" id="slider-wrap" onscroll="updateDots()">
                    <div class="slide" id="slide-img"></div>
                    <div class="slide" id="slide-video"></div>
                </div>
                <div class="slider-dots" id="dots-container">
                    <div class="dot active" id="dot0"></div>
                    <div class="dot" id="dot1"></div>
                </div>
            </div>

            <h2 id="prod-title" style="color:var(--text-gold); margin: 0; text-transform: uppercase; text-align: center;"></h2>
            <p id="prod-desc" style="opacity: 0.7; text-align: center; margin-top: 5px;"></p>
            <div id="prod-prices" class="price-grid"></div>
            <button class="btn-back" onclick="goBack()">RETOUR AU CATALOGUE</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function updateDots() {
            const wrap = document.getElementById('slider-wrap');
            const index = Math.round(wrap.scrollLeft / wrap.offsetWidth);
            document.getElementById('dot0').classList.toggle('active', index === 0);
            document.getElementById('dot1').classList.toggle('active', index === 1);
        }

        function openProduct(title, media, desc, prices, videoUrl = null) {
            document.getElementById('details-view').style.display = 'block';
            document.body.style.overflow = 'hidden';
            document.getElementById('prod-title').innerText = title;
            document.getElementById('prod-desc').innerText = desc;
            
            const wrap = document.getElementById('slider-wrap');
            const dots = document.getElementById('dots-container');
            
            document.getElementById('slide-img').innerHTML = `<img src="${media}">`;
            
            if(videoUrl) {
                // Utilisation de l'URL directe pour ÃĐviter les redirections Dropbox
                const finalUrl = videoUrl.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
                document.getElementById('slide-video').innerHTML = `<video id="vp" autoplay loop muted playsinline webkit-playsinline controls><source src="${finalUrl}" type="video/mp4"></video>`;
                wrap.style.width = "200%";
                dots.style.display = 'flex';
            } else {
                document.getElementById('slide-video').innerHTML = '';
                wrap.style.width = "100%";
                dots.style.display = 'none';
            }

            let priceHtml = "";
            prices.forEach(p => { priceHtml += `<div class="price-item"><span class="p-gram">${p[0]}</span><span class="p-value">${p[1]}</span></div>`; });
            document.getElementById('prod-prices').innerHTML = priceHtml;
            wrap.scrollLeft = 0;
        }

        function goBack() {
            document.getElementById('details-view').style.display = 'none';
            document.body.style.overflow = 'auto';
            const v = document.getElementById('vp'); if(v) v.pause();
        }
    </script>
</body>
</html>
