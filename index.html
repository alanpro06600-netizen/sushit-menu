<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sush'IT Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent-red: #ff3e3e;
            --glass-bg: rgba(15, 15, 15, 0.98);
            --text-gold: #f1d279;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: url('https://i.imgur.com/xvvP6oB.jpeg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; padding: 0; color: white; overflow-x: hidden;
        }

        /* --- MENU --- */
        #main-menu { padding: 20px; width: 100%; max-width: 450px; margin: 0 auto; }
        .header { text-align: center; margin: 20px 0 30px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 50px; border: 2px solid var(--accent-red); cursor: pointer; }
        .logo { font-size: 1.8rem; font-weight: 900; margin: 0; }

        .category-item {
            background: var(--glass-bg); border-radius: 15px; margin-bottom: 10px; padding: 18px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
        }
        .cat-left { display: flex; align-items: center; gap: 15px; font-size: 1.1rem; font-weight: 600; }
        .cat-icon { font-size: 1.4rem; width: 30px; text-align: center; }
        .arrow-right { opacity: 0.4; font-size: 1.2rem; }

        /* --- FICHE PRODUIT --- */
        #details-view { 
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 999;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        .modal-content {
            width: 100%; max-width: 450px; margin: 80px auto 0 auto;
            background: var(--glass-bg); border-radius: 30px 30px 0 0;
            padding: 25px; min-height: 100vh; border: 1px solid var(--text-gold); border-bottom: none;
        }
        
        /* SLIDER HORIZONTAL */
        .slider-container {
            width: 100%; aspect-ratio: 1 / 1; margin-bottom: 20px;
            border-radius: 20px; overflow: hidden; background: #000; border: 1px solid #333;
            position: relative;
        }

        .slider-wrapper {
            display: flex; width: 200%; height: 100%;
            overflow-x: auto; scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Cache scrollbar Firefox */
        }
        .slider-wrapper::-webkit-scrollbar { display: none; } /* Cache scrollbar Chrome/Safari */

        .slide {
            width: 100%; height: 100%; flex-shrink: 0;
            scroll-snap-align: start;
        }
        .slide img, .slide video { width: 100%; height: 100%; object-fit: cover; }

        /* Indicateur de swipe (petits points) */
        .slider-dots {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; pointer-events: none;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); }
        .dot.active { background: var(--text-gold); width: 20px; border-radius: 10px; }

        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .price-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,62,62,0.3); }
        .p-gram { font-weight: bold; color: var(--text-gold); }
        .p-value { display: block; font-size: 1.2rem; font-weight: 900; }

        .review-box { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stars { display: flex; gap: 8px; margin-bottom: 10px; justify-content: center; }
        .star { font-size: 24px; color: #333; cursor: pointer; }
        .star.active { color: var(--text-gold); }
        textarea { width: 100%; background: #1a1a1a; border: 1px solid #444; border-radius: 10px; color: white; padding: 12px; resize: none; font-family: inherit; }
        .btn-post { background: var(--accent-red); color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        
        #comments-list { margin-top: 15px; border-top: 1px solid #333; padding-top: 10px; }
        .comment-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; position: relative; font-size: 0.85rem; }
        .del-btn { position: absolute; top: 5px; right: 10px; color: #ff3e3e; font-weight: bold; cursor: pointer; }

        .btn-back { background: transparent; color: white; border: 1px solid white; padding: 15px; width: 100%; border-radius: 15px; margin: 20px 0 120px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-menu">
        <div class="header" id="admin-trigger"><h1 class="logo">SUSH'IT</h1></div>
        
        <div class="category-item" onclick="openProduct('FROZEN', 'https://i.imgur.com/xvvP6oB.jpeg', 'Texture givrée premium.', [['2g','20€'],['6g','50€'],['10g','70€'],['25g','150€']])">
            <div class="cat-left"><span class="cat-icon">❄️</span><span>FROZEN</span></div>
            <div class="arrow-right">❯</div>
        </div>

        <div class="category-item" onclick="openProduct('FILTRÉ', 'https://i.imgur.com/xvvP6oB.jpeg', 'Filtrage traditionnel.', [['2g','20€'],['6g','50€'],['10g','70€'],['25g','150€']])">
            <div class="cat-left"><span class="cat-icon">💥</span><span>FILTRÉ</span></div>
            <div class="arrow-right">❯</div>
        </div>

        <div class="category-item" onclick="openProduct('STATIC', 'https://i.imgur.com/xvvP6oB.jpeg', 'Puissance et pureté.', [['2g','20€'],['6g','50€'],['10g','70€'],['25g','160€']])">
            <div class="cat-left"><span class="cat-icon">⚡️</span><span>STATIC</span></div>
            <div class="arrow-right">❯</div>
        </div>

        <div class="category-item" onclick="openProduct('MOUSSEUX', 'https://i.imgur.com/xvvP6oB.jpeg', 'Douceur et légèreté.', [['2g','10€'],['4.5g','20€'],['12g','50€'],['25g','100€']], 'https://www.dropbox.com/scl/fi/5wt41hiv7g8kr48eytecb/EE29B192-97E3-4D85-B637-EA1BA814D3F3.mp4?rlkey=t84b4b5t4u6jbet3yodx6zd16&st=x8bqu2m6&raw=1')">
            <div class="cat-left"><span class="cat-icon">🧽</span><span>MOUSSEUX</span></div>
            <div class="arrow-right">❯</div>
        </div>
    </div>

    <div id="details-view">
        <div class="modal-content">
            <div class="slider-container">
                <div class="slider-wrapper" id="slider-wrap" onscroll="updateDots()">
                    <div class="slide" id="slide-img"></div>
                    <div class="slide" id="slide-video"></div>
                </div>
                <div class="slider-dots">
                    <div class="dot active" id="dot0"></div>
                    <div class="dot" id="dot1"></div>
                </div>
            </div>

            <h2 id="prod-title" style="color:var(--text-gold); margin: 0; text-transform: uppercase; text-align: center;"></h2>
            <p id="prod-desc" style="opacity: 0.7; text-align: center; margin-top: 5px;"></p>
            <div id="prod-prices" class="price-grid"></div>

            <div class="review-box">
                <div class="stars" id="star-rating">
                    <span class="star" onclick="setStar(1)">★</span><span class="star" onclick="setStar(2)">★</span><span class="star" onclick="setStar(3)">★</span><span class="star" onclick="setStar(4)">★</span><span class="star" onclick="setStar(5)">★</span>
                </div>
                <textarea id="review-text" rows="2" placeholder="Laisse un avis..."></textarea>
                <button class="btn-post" onclick="postReview()">POSTER</button>
                <div id="comments-list"></div>
            </div>
            <button class="btn-back" onclick="goBack()">RETOUR AU CATALOGUE</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let currentRating = 0, currentProduct = "", adminMode = false;

        function updateDots() {
            const wrap = document.getElementById('slider-wrap');
            const index = Math.round(wrap.scrollLeft / wrap.offsetWidth);
            document.getElementById('dot0').classList.toggle('active', index === 0);
            document.getElementById('dot1').classList.toggle('active', index === 1);
        }

        function openProduct(title, media, desc, prices, videoUrl = null) {
            currentProduct = title;
            document.getElementById('details-view').style.display = 'block';
            document.body.style.overflow = 'hidden';
            document.getElementById('prod-title').innerText = title;
            document.getElementById('prod-desc').innerText = desc;
            
            // Image en 1er
            document.getElementById('slide-img').innerHTML = `<img src="${media}">`;
            
            // Vidéo en 2ème
            if(videoUrl) {
                document.getElementById('slide-video').innerHTML = `<video id="vp" controls playsinline muted autoplay loop><source src="${videoUrl}" type="video/mp4"></video>`;
                document.querySelector('.slider-dots').style.display = 'flex';
            } else {
                document.getElementById('slide-video').innerHTML = '';
                document.querySelector('.slider-dots').style.display = 'none';
            }

            let priceHtml = "";
            prices.forEach(p => { priceHtml += `<div class="price-item"><span class="p-gram">${p[0]}</span><span class="p-value">${p[1]}</span></div>`; });
            document.getElementById('prod-prices').innerHTML = priceHtml;
            loadComments();
            document.getElementById('slider-wrap').scrollLeft = 0;
        }

        function goBack() {
            document.getElementById('details-view').style.display = 'none';
            document.body.style.overflow = 'auto';
            const v = document.getElementById('vp'); if(v) v.pause();
        }

        function setStar(n) { currentRating = n; document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < n)); }

        function postReview() {
            const text = document.getElementById('review-text').value;
            if(!currentRating || !text.trim()) return;
            const review = { id: Date.now(), prod: currentProduct, rating: currentRating, text: text };
            let reviews = JSON.parse(localStorage.getItem('s_rev') || "[]");
            reviews.unshift(review);
            localStorage.setItem('s_rev', JSON.stringify(reviews));
            document.getElementById('review-text').value = ''; setStar(0); loadComments();
        }

        function loadComments() {
            let reviews = JSON.parse(localStorage.getItem('s_rev') || "[]");
            let html = "";
            reviews.filter(r => r.prod === currentProduct).forEach(r => {
                html += `<div class="comment-item"><div style="color:var(--text-gold)">${"★".repeat(r.rating)}</div>${r.text}</div>`;
            });
            document.getElementById('comments-list').innerHTML = html || "<div style='opacity:0.3; text-align:center;'>Aucun avis.</div>";
        }
    </script>
</body>
</html>
